server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SEARCH_LOCATIONS:file:/app/configs}
        # Git remoto desabilitado — use profile "git" apenas se precisar do repositório externo.
        git:
          uri: https://github.com/PedroScheurer/microservices-atitus.git
          default-label: main
          search-paths: 'configs'
          clone-on-start: true
          force-pull: true

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      github:
        repo: PedroScheurer/microservices-atitus
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,circuit-breakers,circuit-breaker,events
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
  health:
    defaults:
      enabled: true
    configserver:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    description: [Serviço que gerencia as configurações dos outros serviços]
    autor: [Pedro Konig Scheurer]
