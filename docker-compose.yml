x-postgres-defaults: &postgres-defaults
  image: postgres:16-alpine
  environment: &postgres-env
    POSTGRES_USER: admin
    POSTGRES_PASSWORD: admin
  networks:
    - microservices-net
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U admin"]
    interval: 10s
    timeout: 5s
    retries: 5

services:

  # ─── BANCOS DE DADOS (1 instância PostgreSQL por serviço) ─────

  postgres-auth:
    <<: *postgres-defaults
    container_name: postgres-auth
    environment:
      <<: *postgres-env
      POSTGRES_DB: db_user
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  postgres-product:
    <<: *postgres-defaults
    container_name: postgres-product
    environment:
      <<: *postgres-env
      POSTGRES_DB: bd_product
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  postgres-currency:
    <<: *postgres-defaults
    container_name: postgres-currency
    environment:
      <<: *postgres-env
      POSTGRES_DB: db_currency
    volumes:
      - postgres_currency_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  postgres-order:
    <<: *postgres-defaults
    container_name: postgres-order
    environment:
      <<: *postgres-env
      POSTGRES_DB: db_order
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - ./databases/pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./databases/pgpass:/pgpass:ro
    depends_on:
      postgres-auth:
        condition: service_healthy
      postgres-product:
        condition: service_healthy
      postgres-currency:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── CONFIG ───────────────────────────────────────────────────

  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      SPRING_PROFILES_ACTIVE: composite
      CONFIG_GIT_URI: https://github.com/PedroScheurer/marcal-store.git
      CONFIG_SEARCH_LOCATIONS: file:/app/configs
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ─── DISCOVERY ────────────────────────────────────────────────

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── SERVIÇOS DE NEGÓCIO ──────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8900:8900"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/db_user
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    networks:
      - microservices-net

  currency-service:
    build: ./currency-service
    container_name: currency-service
    ports:
      - "18081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-currency:5432/db_currency
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-currency:
        condition: service_healthy
    networks:
      - microservices-net

  greeting-service:
    build: ./greeting-service
    container_name: greeting-service
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-service:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8200:8200"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/db_order
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
    networks:
      - microservices-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      DB_HOST: postgres-product
      DB_PORT: "5432"
      DB_NAME: bd_product
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_URL: http://discovery-service:8761/eureka
      HOST_NAME: product-service
      UPLOAD_DIR: /app/uploads
      MAX_VIDEO_MB: "100"
      MAX_IMAGE_MB: "10"
    volumes:
      - product_uploads:/app/uploads
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-product:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── GATEWAY ──────────────────────────────────────────────────

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8765:8765"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
      currency-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - microservices-net

# ─── VOLUMES E REDE ───────────────────────────────────────────

volumes:
  postgres_auth_data:
  postgres_product_data:
  postgres_currency_data:
  postgres_order_data:
  product_uploads:

networks:
  microservices-net:
    driver: bridge
