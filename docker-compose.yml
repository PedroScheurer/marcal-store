services:

  # ─── INFRAESTRUTURA ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── CONFIG ───────────────────────────────────────────────────

  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── DISCOVERY ────────────────────────────────────────────────

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── SERVIÇOS DE NEGÓCIO ──────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8900:8900"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_user
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - microservices-net

  currency-service:
    build: ./currency-service
    container_name: currency-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_currency
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - microservices-net

  greeting-service:
    build: ./greeting-service
    container_name: greeting-service
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-service:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8200:8200"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_order
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - microservices-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bd_product
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      EUREKA_URL: http://discovery-service:8761/eureka
      HOSTNAME: product-service
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── GATEWAY ──────────────────────────────────────────────────

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8765:8765"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net

# ─── VOLUMES E REDE ───────────────────────────────────────────

volumes:
  postgres_data:

networks:
  microservices-net:
    driver: bridge